<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Generation - Prose Pipeline</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Generated Prose Viewer</h1>
            <p class="subtitle">View your AI-generated prose and critique</p>
        </header>

        <nav>
            <button onclick="window.location.href='/'" class="nav-btn">← Back to Home</button>
        </nav>

        <main>
            <div class="info-card">
                <h3>Enter Generation ID</h3>
                <input type="text" id="gen-id" placeholder="e.g., e02449b7-0a2c-4d6d-8e69-b8cddc01b006" style="width: 100%; padding: 10px; margin-bottom: 10px; background: var(--surface-light); border: 1px solid var(--border); color: var(--text); border-radius: 6px;">
                <button onclick="loadGeneration()" class="btn-primary">Load Generation</button>
            </div>

            <div id="loading" style="display: none;" class="info-card">
                <p>Loading generation...</p>
            </div>

            <div id="error" style="display: none;" class="info-card" style="border-color: var(--danger);">
                <h3>Error</h3>
                <p id="error-message"></p>
            </div>

            <div id="result" style="display: none;">
                <div class="info-card">
                    <h3>Generation Info</h3>
                    <p><strong>Status:</strong> <span id="status" class="badge"></span></p>
                    <p><strong>Scene ID:</strong> <span id="scene-id"></span></p>
                    <p><strong>Iteration:</strong> <span id="iteration"></span></p>
                    <p><strong>Max Iterations:</strong> <span id="max-iterations"></span></p>
                </div>

                <div id="prose-section" style="display: none;" class="info-card">
                    <h3>Generated Prose</h3>
                    <div id="prose" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-secondary);"></div>
                </div>

                <div id="critique-section" style="display: none;" class="info-card">
                    <h3>Critique</h3>
                    <div id="critique" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-secondary);"></div>
                </div>

                <div id="actions" style="display: none;" class="info-card">
                    <h3>Actions</h3>
                    <button onclick="approveAndRevise()" class="btn-primary" id="approve-btn">Approve & Revise</button>
                    <button onclick="acceptFinal()" class="btn-success" id="accept-btn">Accept as Final</button>
                    <button onclick="reject()" class="btn-danger">Reject</button>
                </div>

                <div id="summary-section" style="display: none;" class="info-card">
                    <h3>Scene Summary (Auto-Generated)</h3>
                    <div id="summary" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-secondary);"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentGenId = null;

        // Check URL for generation ID
        const urlParams = new URLSearchParams(window.location.search);
        const genIdFromUrl = urlParams.get('id');
        if (genIdFromUrl) {
            document.getElementById('gen-id').value = genIdFromUrl;
            loadGeneration();
        }

        async function loadGeneration() {
            const genId = document.getElementById('gen-id').value.trim();
            if (!genId) {
                showError('Please enter a generation ID');
                return;
            }

            currentGenId = genId;
            showLoading();

            try {
                const response = await fetch(`/api/generations/${genId}`);
                if (!response.ok) {
                    throw new Error('Generation not found');
                }

                const data = await response.json();
                displayGeneration(data);
            } catch (error) {
                showError(error.message);
            }
        }

        function displayGeneration(data) {
            hideLoading();
            document.getElementById('result').style.display = 'block';

            // Status
            document.getElementById('status').textContent = data.status;
            document.getElementById('status').className = 'badge';

            // Info
            document.getElementById('scene-id').textContent = data.scene_id;
            document.getElementById('iteration').textContent = data.current_iteration;
            document.getElementById('max-iterations').textContent = data.max_iterations;

            // Prose
            if (data.current_prose || data.final_prose) {
                document.getElementById('prose-section').style.display = 'block';
                document.getElementById('prose').textContent = data.final_prose || data.current_prose;
            }

            // Critique
            if (data.current_critique) {
                document.getElementById('critique-section').style.display = 'block';
                document.getElementById('critique').textContent = data.current_critique;
            }

            // Actions
            if (data.status === 'awaiting_approval') {
                document.getElementById('actions').style.display = 'block';

                // Show/hide approve button based on can_revise
                const approveBtn = document.getElementById('approve-btn');
                if (data.can_revise) {
                    approveBtn.style.display = 'inline-block';
                    const remaining = data.max_iterations - data.current_iteration;
                    approveBtn.textContent = `Approve & Revise (${remaining} remaining)`;
                } else {
                    approveBtn.style.display = 'none';
                }
            }

            // Summary
            if (data.scene_summary) {
                document.getElementById('summary-section').style.display = 'block';
                document.getElementById('summary').textContent = data.scene_summary;
            }

            // Status messages
            if (data.status === 'generating') {
                showError('Still generating prose... Refresh in a moment.');
            } else if (data.status === 'critiquing') {
                showError('Still critiquing... Refresh in a moment.');
            } else if (data.status === 'revising') {
                showError('Revising prose... Refresh in a moment.');
            } else if (data.status === 'generating_summary') {
                showError('Generating scene summary... Refresh in a moment.');
            } else if (data.status === 'error') {
                showError('Generation failed: ' + (data.error_message || 'Unknown error'));
            }
        }

        async function approveAndRevise() {
            if (!currentGenId) return;

            if (!confirm('Approve this iteration and generate a revision based on the critique?')) {
                return;
            }

            try {
                const response = await fetch(`/api/generations/${currentGenId}/approve`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('Failed to approve');
                }

                alert('Revision started! Wait 60 seconds then refresh this page.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function acceptFinal() {
            if (!currentGenId) return;

            if (!confirm('Accept this prose as final? This will generate a scene summary.')) {
                return;
            }

            try {
                const response = await fetch(`/api/generations/${currentGenId}/accept`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('Failed to accept');
                }

                alert('Accepted! Generating scene summary... Wait 20 seconds then refresh this page.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function reject() {
            if (!currentGenId) return;

            if (!confirm('Reject this generation? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`/api/generations/${currentGenId}/reject`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('Failed to reject');
                }

                alert('Generation rejected.');
                loadGeneration(); // Reload
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }
    </script>
</body>
</html>
